apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k3d-application-cluster-prometheus-stack
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 55.7.0
      helm:
        releaseName: monitor
        valueFiles:
          # Reference: Default values
          - $values/core-values/prometheus/default-prometheus.yaml
          - $values/core-values/prometheus/default-prometheus-alertmanager.yaml
          - $values/core-values/prometheus/exporters/default-exporters.yaml
          - $values/core-values/prometheus/jobs/default-jobs.yaml
          - $values/core-values/prometheus/rules/default-rules.yaml
          # Reference: Customizable values
          - $values/custom-values/prometheus/k3d-application-cluster/prometheus.yaml
          - $values/custom-values/prometheus/k3d-application-cluster/exporters/exporters.yaml
          - $values/custom-values/prometheus/k3d-application-cluster/jobs/jobs.yaml
          - $values/custom-values/prometheus/k3d-application-cluster/rules/rules.yaml
    # Repositório de valores (ref: values)
    - repoURL: https://github.com/douglasgrande/lab-monitoring.git
      targetRevision: main
      ref: values